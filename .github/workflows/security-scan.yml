name: Security Scanning Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Minimal permissions — each job elevates only what it needs
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: SAST — Semgrep static analysis
  # Scans source code for security anti-patterns without executing it.
  # Fails the build if any ERROR-severity finding is detected.
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF to GitHub Security tab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          # auto pulls the full recommended rule set including OWASP, injection, secrets
          config: >-
            p/default
            p/owasp-top-ten
            p/secrets
            p/terraform
          # Exit 1 on any ERROR-level finding — breaks the build
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ---------------------------------------------------------------------------
  # Job 2: SCA — dependency vulnerability scan
  # Checks all package manifests (npm, pip, go.sum, etc.) for known CVEs.
  # Fails the build on CRITICAL or HIGH severity findings.
  # ---------------------------------------------------------------------------
  sca:
    name: SCA (Trivy filesystem)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy SCA (dependency + IaC scan)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          # Scan dependency files and IaC configs
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          # Exit 1 on any CRITICAL or HIGH finding — breaks the build
          exit-code: "1"
          format: sarif
          output: trivy-fs-results.sarif
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-report
          path: trivy-fs-results.sarif
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Container image scanning
  # Builds the Docker image and scans it before any push to the registry.
  # A CRITICAL or HIGH OS/library CVE in the image breaks the build.
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [sast, sca]  # only build the image if earlier gates pass
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        # Scan each service image independently so failures are scoped
        service: [api, payment-service, kyc-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — scan only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.service }}/Dockerfile
          push: false
          tags: clearpay/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Load into local Docker daemon for Trivy to scan
          load: true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: image
          image-ref: clearpay/${{ matrix.service }}:${{ github.sha }}
          # Scan OS packages + application libraries inside the image
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          # Exit 1 on CRITICAL or HIGH — prevents the image from being pushed
          exit-code: "1"
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif
          # Ignore findings for which no fix is available (reduces noise)
          ignore-unfixed: false
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif

      - name: Upload image scan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report-${{ matrix.service }}
          path: trivy-image-${{ matrix.service }}.sarif
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: IaC security scan — Checkov
  # Validates Terraform and Kubernetes manifests against security best practices.
  # Fails on HIGH or CRITICAL policy violations.
  # ---------------------------------------------------------------------------
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform + Kubernetes
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes
          # Fail on HIGH and CRITICAL policy checks
          soft_fail: false
          output_format: sarif
          output_file_path: checkov-results.sarif
          # Only fail on checks with these severities
          check: HIGH,CRITICAL

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ---------------------------------------------------------------------------
  # Job 5: Secret detection — Gitleaks
  # Scans git history and staged files for accidentally committed secrets.
  # Always fails immediately on any finding — no severity threshold.
  # ---------------------------------------------------------------------------
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE required for org-level scans; omit for public repos
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ---------------------------------------------------------------------------
  # Gate: all security checks must pass before deployment is allowed
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, container-scan, iac-scan, secret-detection]
    if: always()

    steps:
      - name: Evaluate gate
        run: |
          echo "SAST result:             ${{ needs.sast.result }}"
          echo "SCA result:              ${{ needs.sca.result }}"
          echo "Container scan result:   ${{ needs.container-scan.result }}"
          echo "IaC scan result:         ${{ needs.iac-scan.result }}"
          echo "Secret detection result: ${{ needs.secret-detection.result }}"

          if [[ "${{ needs.sast.result }}"           != "success" ||
                "${{ needs.sca.result }}"            != "success" ||
                "${{ needs.container-scan.result }}" != "success" ||
                "${{ needs.iac-scan.result }}"       != "success" ||
                "${{ needs.secret-detection.result }}" != "success" ]]; then
            echo "One or more security checks failed. Blocking deployment."
            exit 1
          fi

          echo "All security checks passed. Deployment is permitted."
