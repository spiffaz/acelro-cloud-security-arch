# AWS Secrets Manager integration via Secrets Store CSI Driver
#
# Prerequisites (installed via Helm):
#   helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
#   helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
#     --namespace kube-system --set syncSecret.enabled=true
#
#   helm repo add aws-secrets-manager https://aws.github.io/secrets-store-csi-driver-provider-aws
#   helm install secrets-provider-aws aws-secrets-manager/secrets-store-csi-driver-provider-aws \
#     --namespace kube-system

---
# SecretProviderClass: database credentials
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-db-credentials
  namespace: production
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "prod/clearpay/db/password"
        objectType: "secretsmanager"
        objectAlias: "db-password"
      - objectName: "prod/clearpay/db/username"
        objectType: "secretsmanager"
        objectAlias: "db-username"
  # Sync secret values into a Kubernetes Secret object so env vars work
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: db-password
          key: password
        - objectName: db-username
          key: username
---
# SecretProviderClass: third-party API keys
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-api-keys
  namespace: production
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "prod/clearpay/stripe/secret-key"
        objectType: "secretsmanager"
        objectAlias: "stripe-secret-key"
      - objectName: "prod/clearpay/jumio/api-key"
        objectType: "secretsmanager"
        objectAlias: "jumio-api-key"
  secretObjects:
    - secretName: api-keys
      type: Opaque
      data:
        - objectName: stripe-secret-key
          key: stripe-secret-key
        - objectName: jumio-api-key
          key: jumio-api-key
---
# Sample application deployment — retrieves secrets via CSI mount, no hardcoded values
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
      tier: app
  template:
    metadata:
      labels:
        app: api
        tier: app
    spec:
      serviceAccountName: app-service-account
      automountServiceAccountToken: false

      # Security context — run as non-root, read-only root filesystem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/clearpay-api:latest
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - containerPort: 8080

          # Secrets exposed as environment variables from synced K8s Secrets
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: stripe-secret-key

          # CSI volume mount — driver fetches and refreshes secrets from Secrets Manager
          volumeMounts:
            - name: secrets-store-db
              mountPath: "/mnt/secrets/db"
              readOnly: true
            - name: secrets-store-api
              mountPath: "/mnt/secrets/api"
              readOnly: true
            - name: tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: secrets-store-db
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "aws-db-credentials"
        - name: secrets-store-api
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "aws-api-keys"
        - name: tmp
          emptyDir: {}
