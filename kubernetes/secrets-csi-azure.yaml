# Azure Key Vault integration via Secrets Store CSI Driver
#
# Prerequisites (installed via Helm):
#   helm repo add csi-secrets-store-provider-azure \
#     https://azure.github.io/secrets-store-csi-driver-provider-azure/charts
#   helm install csi-secrets-store-provider-azure \
#     csi-secrets-store-provider-azure/csi-secrets-store-provider-azure \
#     --namespace kube-system
#
# AKS: enable via addon instead of Helm:
#   az aks enable-addons --addons azure-keyvault-secrets-provider \
#     --name clearpay-prod-aks --resource-group clearpay-prod-compute-rg

---
# SecretProviderClass: database credentials from Key Vault
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-db-credentials
  namespace: production
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    # Workload Identity — client ID injected via azure.workload.identity/client-id annotation
    # on the ServiceAccount (defined in rbac.yaml)
    clientID: "AZURE_CLIENT_ID"
    keyvaultName: "clearpay-prod-kv"
    tenantId: "AZURE_TENANT_ID"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: db-password
          objectType: secret
          objectAlias: db-password
        - |
          objectName: db-username
          objectType: secret
          objectAlias: db-username
  secretObjects:
    - secretName: db-credentials
      type: Opaque
      data:
        - objectName: db-password
          key: password
        - objectName: db-username
          key: username
---
# SecretProviderClass: API keys from Key Vault
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-api-keys
  namespace: production
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "AZURE_CLIENT_ID"
    keyvaultName: "clearpay-prod-kv"
    tenantId: "AZURE_TENANT_ID"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: stripe-secret-key
          objectType: secret
          objectAlias: stripe-secret-key
        - |
          objectName: jumio-api-key
          objectType: secret
          objectAlias: jumio-api-key
  secretObjects:
    - secretName: api-keys
      type: Opaque
      data:
        - objectName: stripe-secret-key
          key: stripe-secret-key
        - objectName: jumio-api-key
          key: jumio-api-key
---
# Sample application deployment on AKS — Azure Workload Identity, no hardcoded secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: production
  labels:
    azure.workload.identity/use: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
      tier: app
  template:
    metadata:
      labels:
        app: api
        tier: app
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: app-service-account
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api
          image: clearpayacr.azurecr.io/clearpay-api:latest
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - containerPort: 8080

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: stripe-secret-key

          volumeMounts:
            - name: secrets-store-db
              mountPath: "/mnt/secrets/db"
              readOnly: true
            - name: secrets-store-api
              mountPath: "/mnt/secrets/api"
              readOnly: true
            - name: tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: secrets-store-db
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-db-credentials"
        - name: secrets-store-api
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-api-keys"
        - name: tmp
          emptyDir: {}
